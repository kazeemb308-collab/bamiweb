<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI - BAMIweb</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #111;
            color: #fff;
            font-family: 'Roboto', sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
        }
        div { font-family: 'Roboto', sans-serif; font-size: 10px; text-align: center; margin-top: 20px; }
        .ai-container {
            flex: 1;
            position: relative;
            padding-bottom: 100px;
        }
        #chat-box{
            display:flex;
            flex-direction:column;
            gap:15px;
            padding:20px 20px 20px 20px;
            max-height: calc(100vh - 240px);
            overflow-y:auto;
            box-sizing: border-box;
        }
.user{
    align-self:flex-end;
    max-width:80%;
    background: rgb(61, 53, 53);
    color:white;
    padding:14px 18px;
    border-radius:20px 20px 5px 20px;
    font-size:16px;
    line-height:1.5;
    word-wrap:break-word;

}
.bot{
    align-self:flex-start;
    width: fit-content;
    max-width:min(92%, 900px);
    background: black;
    color:white;
    padding:14px 18px;
    font-size:16px;
    line-height:1.5;
    word-wrap:break-word;
    text-align:left;
    border-radius:20px 20px 20px 5px;
}
.bot > :first-child { margin-top: 0; }
.bot > :last-child { margin-bottom: 0; }
.bot pre {
    white-space: pre-wrap;
    overflow-x: auto;
}
.bot code {
    background: rgba(255,255,255,0.12);
    padding: 2px 4px;
    border-radius: 4px;
}
        .browser-header {
            background-color: #1a1a1a;
            border-bottom: 1px solid #333333;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        .browser-logo {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0px;
            color: #202124;
        }

        .browser-logo span:nth-child(1) { color: rgba(78, 156, 78, 0.726); }
        .browser-logo span:nth-child(2) { color: rgb(180, 96, 96); }
        .browser-logo span:nth-child(3) { color: rgb(190, 190, 107); }
        .browser-logo span:nth-child(4) { color: rgb(100, 100, 201); }
        .browser-logo span:nth-child(5) { color: rgb(129, 199, 129); }
        .browser-logo span:nth-child(6) { color: rgb(187, 125, 125); }
        .browser-logo span:nth-child(7) { color: rgb(132, 132, 211); }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-controls button {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .header-controls button:hover {
            background-color: #333333;
        }
        .logo-large {
            font-size: 72px;
            font-weight: 700;
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 40px;
        }
        .logo-small {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 40px;
            color: rgb(67, 183, 221);
        }
        .ai-container {
            flex: 1;
            position: relative;
            padding-bottom: 100px;
        }
        #chat-box{
            display:flex;
            flex-direction:column;
            gap:15px;
            padding:20px 20px 90px 20px;
            max-height: calc(100vh - 240px);
            overflow-y:auto;
            box-sizing: border-box;
        }
.ai-input{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    width:95%;
    max-width:850px;
    z-index:1000;
}
.ai-input input{
    width:100%;
    height:60px;
    padding:0 70px 0 20px;
    border:none;
    outline:none;
    border-radius:35px;
    background:#2a2a2a;
    color:white;
    font-size:17px;
    box-sizing:border-box;
}
.ai-input input::placeholder{
    color:#b3b3b3;
}
.ai-input button{
    position:absolute;
    top:50%;
    right:8px;
    transform:translateY(-50%);
    width:46px;
    height:46px;
    border:none;
    border-radius:50%;
    background:#2f6fed;
    color:white;
    font-size:22px;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:.2s;
}
.ai-input button:hover{
    background:#1f5ce0;
}
@media(max-width:600px){
    .ai-input{
        width:96%;
        bottom:10px;
    }
    .ai-input input{
        height:56px;
       font-size:16px;
    }
    .ai-input button{
        width:42px;
        height:42px;
        font-size:20px;
    }
}
    </style>
</head>
<body>
    <!--Browser Header-->   
    <div class="browser-header">
        <div class="browser-logo">
            <span>B</span><span>A</span><span>M</span><span>I</span><span>w</span><span>e</span><span>b</span>
        </div>
        <div class="header-controls">
            <button title="Refresh" id="refresh-btn">&#128203;</button>
            <button title="Settings" id="settings-btn">&#128203;</button>
        </div>
    </div>
    <div class="logo-large">
            <span style="color: rgba(78, 156, 78, 0.726);">B</span><span style="color: rgb(180, 96, 96);">A</span><span style="color: rgb(190, 190, 107);">M</span><span style="color: rgb(100, 100, 201);">I</span><span style="color: rgb(129, 199, 129);">w</span><span style="color: rgb(187, 125, 125);">e</span><span style="color: rgb(132, 132, 211);">b</span>
            <div class="logo-small">AI</div>
    </div>
    <div class="ai-container">
        <div id="chat-box"></div>
        <form id="chat-form" class="ai-input">
            <input type="text" id="user-input" placeholder="Type your message here...">
            <button type="submit"><b>&#10148;</b></button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="ai.js"></script>
</body>
</html>
