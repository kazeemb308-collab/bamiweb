<!DOCTYPE HTML>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <title>Bamiweb - Your Personal Search Hub</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <script>
        try{ sessionStorage.setItem('bami-theme','dark'); }catch(e){}
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Browser Header */
        .browser-header {
            background-color: #1a1a1a;
            border-bottom: 1px solid #333333;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .browser-logo {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 2px;
            color: #ffffff;
        }

        .browser-logo span:nth-child(1) { color: rgba(78, 156, 78, 0.726); }
        .browser-logo span:nth-child(2) { color: rgb(180, 96, 96); }
        .browser-logo span:nth-child(3) { color: rgb(190, 190, 107); }
        .browser-logo span:nth-child(4) { color: rgb(100, 100, 201); }
        .browser-logo span:nth-child(5) { color: rgb(129, 199, 129); }
        .browser-logo span:nth-child(6) { color: rgb(187, 125, 125); }
        .browser-logo span:nth-child(7) { color: rgb(132, 132, 211); }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-controls button {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .header-controls button:hover {
            background-color: #333333;
        }

        /* Main Container */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Search Section */
        .search-section {
            text-align: center;
            margin: 40px 0;
        }

        .logo-large {
            font-size: 72px;
            font-weight: 700;
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 40px;
        }

        .search-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .search-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            max-width: 700px;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 280px;
        }

        .search-input {
            width: 100%;
            height: 48px;
            font-size: 16px;
            padding: 12px 16px;
            border-radius: 999px;
            border: 2px solid #5a8dff;
            background-color: transparent;
            color: #ffffff;
            outline: none;
            box-shadow: 0 0 15px rgba(90, 141, 255, 0.6);
            transition: all 0.3s;
        }

        .search-input::placeholder {
            color: #999999;
        }

        .search-input:focus {
            border-color: #4097ee;
            box-shadow: 0 0 0 3px rgba(64, 151, 238, 0.2);
        }

        .search-btn {
            height: 48px;
            padding: 0 5px;
            border-radius: 2000px;
            background-color: #4097ee;
            color: #ffffff;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .search-btn:hover {
            background-color: #3077cc;
        }

        /* Suggestions Dropdown */
        .suggestions-list {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 12px;
            border-top: none;
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.5);
            z-index: 100;
            max-height: 300px;
            overflow-y: auto;
            margin-top: -1px;
        }

        .suggestion-item {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 14px;
            color: #ffffff;
            border-bottom: 1px solid #222222;
            transition: background-color 0.2s;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background-color: #252525;
        }

        /* Search Categories */
        .search-categories {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .category-btn {
            background-color: #1a1a1a;
            border: 1px solid #333333;
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .category-btn:hover {
            background-color: #252525;
            border-color: #4097ee;
            color: #4097ee;
        }

        /* Pinned Websites */
        .pinned-section {
            margin: 40px 0;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #cccccc;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-btn {
            background-color: #4097ee;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background-color 0.3s;
        }

        .add-btn:hover {
            background-color: #3077cc;
        }

        .pinned-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 900px;
        }

        .pinned-card {
            background: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 140px;
            text-decoration: none;
            color: inherit;
        }

        .pinned-card:hover {
            background: #252525;
            border-color: #4097ee;
            transform: translateY(-4px);
            box-shadow: 0 4px 12px rgba(64, 151, 238, 0.2);
        }

        .pinned-icon {
            font-size: 32px;
            color: #4097ee;
        }

        .pinned-name {
            font-size: 12px;
            color: #cccccc;
            font-weight: 600;
        }

        .pinned-card-remove {
            position: absolute;
            top: 8px;
            right: 8px;
            background: transparent;
            border: none;
            color: #ff6b6b;
            font-size: 14px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .pinned-card:hover .pinned-card-remove {
            opacity: 1;
        }

        /* Continue Browsing Section */
        .continue-section {
            margin: 40px 0;
        }

        .browse-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 900px;
        }

        .browse-item {
            background: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: inherit;
        }

        .browse-item:hover {
            background: #252525;
            border-color: #4097ee;
        }

        .browse-icon {
            font-size: 20px;
            color: #4097ee;
        }

        .browse-text {
            flex: 1;
            text-align: left;
        }

        .browse-title {
            font-size: 13px;
            color: #ffffff;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .browse-url {
            font-size: 11px;
            color: #999999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Widgets Section */
        .widgets-section {
            margin: 40px 0;
        }

        .widgets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 500px;
        }

        .widget {
            background: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .widget-title {
            font-size: 12px;
            color: #999999;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .widget-value {
            font-size: 24px;
            font-weight: 700;
            color: #4097ee;
            margin-bottom: 4px;
        }

        .widget-detail {
            font-size: 11px;
            color: #666666;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            color: #666666;
            font-size: 12px;
            border-top: 1px solid #222222;
        }

        .footer-links {
            margin-bottom: 10px;
        }

        .footer-links a {
            color: #4097ee;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #6bb3ff;
        }

        /* Search Tabs (multi-tab search) */
        .tabs {
            display: flex;
            gap: 8px;
            margin: 18px 0 12px 0;
            justify-content: flex-start;
            align-items: center;
            flex-wrap: wrap;
            overflow: auto;
            padding-bottom: 6px;
        }

        .tab {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #141414;
            color: #ddd;
            border: 1px solid #333;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .tab.active { background: #4097ee; color: #fff; border-color: #4097ee; }

        .tab .close {
            font-size: 14px;
            opacity: 0.8;
            margin-left: 6px;
            cursor: pointer;
        }

        .tab-add {
            background: transparent;
            border: 1px dashed #333;
            color: #4097ee;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
        }

        .light-mode-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #4097ee;
            color: white;
            padding: 12px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s;
            box-shadow: 0 4px 12px rgba(64, 151, 238, 0.3);
            z-index: 999;
        }

        .light-mode-btn:hover {
            background-color: #3077cc;
        }

        /* Modal for Adding Pins */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .modal-group {
            margin-bottom: 12px;
        }

        .modal-label {
            font-size: 12px;
            color: #999999;
            margin-bottom: 6px;
            display: block;
        }

        .modal-input {
            width: 100%;
            padding: 10px 12px;
            background: #252525;
            border: 1px solid #333333;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            font-family: 'Roboto', sans-serif;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .modal-btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .modal-btn-cancel {
            background: #252525;
            color: #ffffff;
        }

        .modal-btn-save {
            background: #4097ee;
            color: #ffffff;
        }

        .modal-btn-save:hover {
            background: #3077cc;
        }

        .no-items-message {
            text-align: center;
            color: #666666;
            font-size: 14px;
            padding: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .browser-header {
                padding: 10px 15px;
            }

            .browser-logo {
                font-size: 18px;
            }

            .logo-large {
                font-size: 48px;
                margin-bottom: 30px;
            }

            .search-row {
                flex-direction: column;
                max-width: 90%;
            }

            .search-btn {
                width: auto;
                padding: 0 16px;
                height: 40px;
                font-size: 14px;
            }

            .search-categories {
                gap: 8px;
            }

            .category-btn {
                font-size: 12px;
                padding: 6px 12px;
            }

            .pinned-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 12px;
            }

            .browse-grid {
                grid-template-columns: 1fr;
            }

            .widgets-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .logo-large {
                font-size: 36px;
            }

            .search-btn {
                width: auto;
                padding: 0 12px;
                height: 36px;
                font-size: 13px;
            }

            .pinned-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .pinned-card {
                min-height: 120px;
                padding: 12px 8px;
            }

            .pinned-icon {
                font-size: 24px;
            }

            .pinned-name {
                font-size: 11px;
            }

            .widgets-grid {
                grid-template-columns: 1fr;
            }

            .light-mode-btn {
                bottom: 10px;
                right: 10px;
                padding: 10px 14px;
                font-size: 14px;
            }
        }
        .ai-guy {
            background-color: #4097ee;
            color: white;
            padding: 3px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        .ai-guy:hover {
                background-color: #3077cc;
                }
    </style>
</head>
<body>
    <!-- Browser Header -->
    <div class="browser-header">
        <div class="browser-logo">
            <span>B</span><span>A</span><span>M</span><span>I</span><span>w</span><span>e</span><span>b</span>
        </div>
        <div class="header-controls">
            <button title="Refresh" id="refresh-btn"><i class="fas fa-redo"></i></button>

                <button title="AI" id="ai-btn">AI <i class="fas fa-robot"></i></button>
            </a>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Search Section -->
        <div class="search-section">
            <div class="logo-large">
                <span style="color: rgba(78, 156, 78, 0.726);">B</span><span style="color: rgb(180, 96, 96);">A</span><span style="color: rgb(190, 190, 107);">M</span><span style="color: rgb(100, 100, 201);">I</span><span style="color: rgb(129, 199, 129);">w</span><span style="color: rgb(187, 125, 125);">e</span><span style="color: rgb(132, 132, 211);">b</span>
            </div>

            <form id="search-form" class="search-form" action="https://www.google.com/search" method="get">
                <div class="search-row">
                    <div class="search-wrapper">
                        <input id="search-input" class="search-input" type="text" name="q" placeholder="🔍 Search anything..." autocomplete="off">
                        <div id="suggestions-list" class="suggestions-list"></div>
                    </div>
                    <button type="submit" class="search-btn">Search</button>
                </div>

                <!-- Search Categories -->
                <div class="search-categories" id="search-categories">
                    <button type="button" class="category-btn" data-category="all">All</button>
                    <button type="button" class="category-btn" data-category="images">Images</button>
                    <button type="button" class="category-btn" data-category="news">News</button>
                    <button type="button" class="category-btn" data-category="videos">Videos</button>
                    <button type="button" class="category-btn" data-category="shopping">Shopping</button>
                </div>
            </form>
        </div>

        <!-- Pinned Websites -->
        <div class="pinned-section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="section-title">
                    <i class="fas fa-thumbtack"></i> Pinned Websites
                </div>
                <button class="add-btn" id="add-pin-btn">+ Add Website</button>
            </div>
            <div class="pinned-grid" id="pinned-grid">
                <!-- Pinned cards will be added here -->
            </div>
        </div>

        <!-- Continue Browsing -->
        <div class="continue-section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="section-title">
                    <i class="fas fa-history"></i> Continue Browsing
                </div>
                <button class="add-btn" id="clear-history-btn" style="background-color: #ff6b6b;">Clear All</button>
            </div>
            <div class="browse-grid" id="browse-grid">
                <!-- Recent items will be added here -->
            </div>
        </div>

        <!-- Widgets -->
        <div class="widgets-section">
            <div class="section-title">
                <i class="fas fa-widget"></i> Quick Info
            </div>
            <div class="widgets-grid">
                <div class="widget">
                    <div class="widget-title">Time</div>
                    <div class="widget-value" id="time-widget">--:--</div>
                    <div class="widget-detail" id="date-widget">Loading...</div>
                </div>
                <div class="widget">
                    <div class="widget-title">Weather</div>
                    <div class="widget-value" id="weather-widget">--°C</div>
                    <div class="widget-detail" id="weather-detail">Loading...</div>
                </div>
                <div class="widget">
                    <div class="widget-title">USD/EUR</div>
                    <div class="widget-value" id="currency-widget">--</div>
                    <div class="widget-detail" id="currency-detail">Loading...</div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="footer-links">
                <a href="privacy-dark.html">Privacy Policy</a>
                <a href="terms-dark.html">Terms of Service</a>
                <a href="about-dark.html">About Us</a>
                <a href="help-dark.html">Help</a>
            </div>
            <p>© 2026 Bamiweb. All rights reserved. | Contact: kazeemb308@gmail.com</p>
        </div>
    </div>

    <!-- Modal for Adding Pins -->
    <div class="modal" id="pin-modal">
        <div class="modal-content">
            <div class="modal-title">Add Website Shortcut</div>
            <div class="modal-group">
                <label class="modal-label">Website Name</label>
                <input class="modal-input" type="text" id="pin-name" placeholder="e.g., Google">
            </div>
            <div class="modal-group">
                <label class="modal-label">Website URL</label>
                <input class="modal-input" type="text" id="pin-url" placeholder="https://example.com">
            </div>
            <div class="modal-group">
                <label class="modal-label">Icon (Font Awesome)</label>
                <input class="modal-input" type="text" id="pin-icon" placeholder="fa-google (without 'fa-brands' or 'fa-solid')">
            </div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" id="pin-cancel-btn">Cancel</button>
                <button class="modal-btn modal-btn-save" id="pin-save-btn">Add</button>
            </div>
        </div>
    </div>

    <!-- Light Mode Button -->
    <button class="light-mode-btn" id="theme-toggle-btn" type="button">Light Mode</button>

    <!-- Scripts -->
    <script>
        // Local Storage Keys
        const PINNED_KEY = 'bamiweb-pinned-sites';
        const HISTORY_KEY = 'bamiweb-browse-history';

        // Default Pinned Websites
        const defaultPins = [
            { name: 'Google', url: 'https://www.google.com', icon: 'fa-google' },
            { name: 'YouTube', url: 'https://www.youtube.com', icon: 'fa-youtube' },
            { name: 'Wikipedia', url: 'https://www.wikipedia.org', icon: 'fa-wikipedia-w' },
            { name: 'GitHub', url: 'https://www.github.com', icon: 'fa-github' },
            { name: 'Facebook', url: 'https://www.facebook.com', icon: 'fa-facebook' },
            { name: 'Twitter', url: 'https://www.twitter.com', icon: 'fa-twitter' },
        ];

        // Search Suggestions (fallback)
        const fallbackSuggestions = [
            "latest tech news",
            "world news today",
            "international travel guide",
            "global climate change",
            "best universities in Europe",
            "latest AI news",
            "top movies 2026",
            "popular songs 2026",
            "healthy recipes",
            "world cup 2026",
            "best fitness exercises",
            "best cooking recipes",
            "best home decor",
            "best smart home devices",
            "latest fashion trends",
            "top video games 2026",
            "how to learn programming",
            "best coding languages",
            "what is AI",
            "how to make money online"
        ];

        // Tabs: multi-tab search manager
        const TABS_KEY = 'bami-search-tabs-dark';
        const ACTIVE_TAB_KEY = 'bami-active-search-tab-dark';

        function createDefaultTab(index) {
            return { id: 'tab-' + Date.now() + '-' + Math.floor(Math.random()*1000), title: `Tab ${index}`, query: '' };
        }

        function loadTabs() {
            try {
                const raw = localStorage.getItem(TABS_KEY);
                if (!raw) return [createDefaultTab(1)];
                const tabs = JSON.parse(raw);
                return Array.isArray(tabs) && tabs.length ? tabs : [createDefaultTab(1)];
            } catch (e) { return [createDefaultTab(1)]; }
        }

        function saveTabs(tabs) { try { localStorage.setItem(TABS_KEY, JSON.stringify(tabs)); } catch(e){} }
        function saveActiveTab(id) { try { localStorage.setItem(ACTIVE_TAB_KEY, id); } catch(e){} }

        function renderTabs() {
            const container = document.getElementById('search-tabs');
            container.innerHTML = '';
            const tabs = loadTabs();
            const activeId = localStorage.getItem(ACTIVE_TAB_KEY) || (tabs[0] && tabs[0].id);

            tabs.forEach((t, idx) => {
                const btn = document.createElement('div');
                btn.className = 'tab' + (t.id === activeId ? ' active' : '');
                btn.dataset.id = t.id;
                const label = document.createElement('span');
                label.textContent = (t.title && t.title.length) ? (t.title.length > 24 ? t.title.slice(0,24) + '…' : t.title) : `Tab ${idx+1}`;
                btn.appendChild(label);
                const close = document.createElement('span');
                close.className = 'close';
                close.textContent = '×';
                close.title = 'Close tab';
                close.addEventListener('click', (ev) => { ev.stopPropagation(); closeTab(t.id); });
                btn.appendChild(close);
                btn.addEventListener('click', () => selectTab(t.id));
                container.appendChild(btn);
            });

            const add = document.createElement('button');
            add.className = 'tab-add';
            add.textContent = '+ New Tab';
            add.addEventListener('click', () => { addTab(); });
            container.appendChild(add);
        }

        function addTab() {
            const tabs = loadTabs();
            const newTab = createDefaultTab(tabs.length + 1);
            tabs.push(newTab);
            saveTabs(tabs);
            saveActiveTab(newTab.id);
            renderTabs();
            selectTab(newTab.id);
        }

        function closeTab(id) {
            let tabs = loadTabs();
            const idx = tabs.findIndex(t => t.id === id);
            if (idx === -1) return;
            const wasActive = (localStorage.getItem(ACTIVE_TAB_KEY) === id);
            tabs.splice(idx,1);
            if (tabs.length === 0) tabs = [createDefaultTab(1)];
            saveTabs(tabs);
            if (wasActive) {
                const next = tabs[Math.max(0, idx-1)];
                saveActiveTab(next.id);
                renderTabs();
                selectTab(next.id);
            } else {
                renderTabs();
            }
        }

        function selectTab(id) {
            const tabs = loadTabs();
            const tab = tabs.find(t => t.id === id);
            if (!tab) return;
            saveActiveTab(id);
            renderTabs();
            searchInput.value = tab.query || '';
            searchInput.focus();
            showSuggestions();
            // focus existing search window for this tab or open it
            focusOrOpenSearch(id, tab.query || '');
        }

        function updateActiveTabQuery(q) {
            const id = localStorage.getItem(ACTIVE_TAB_KEY);
            if (!id) return;
            const tabs = loadTabs();
            const tab = tabs.find(t => t.id === id);
            if (!tab) return;
            tab.query = q;
            // also sync title to query (shortened)
            const title = q.trim() || (`Tab ${tabs.indexOf(tab)+1}`);
            tab.title = title.length > 40 ? title.slice(0,40) + '…' : title;
            saveTabs(tabs);
            renderTabs();
        }

        function openSearchWindow(tabId, query) {
            if (!query) return null;
            const name = 'bami-search-' + tabId;
            const url = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            try {
                const win = window.open(url, name);
                return win;
            } catch (e) {
                return null;
            }
        }

        function focusOrOpenSearch(tabId, query) {
            const name = 'bami-search-' + tabId;
            try {
                const win = window.open('', name);
                if (win && !win.closed) {
                    try { win.focus(); return; } catch (e) {}
                }
            } catch (e) {}
            // fallback: open with query (or Google homepage if empty)
            const url = query ? `https://www.google.com/search?q=${encodeURIComponent(query)}` : 'https://www.google.com';
            try { window.open(url, name); } catch (e) {}
        }

        // Initialize
        function init() {
            loadPinnedSites();
            loadBrowseHistory();
            updateWidgets();
            setupEventListeners();
            renderTabs();
            // select stored active or first
            const active = localStorage.getItem(ACTIVE_TAB_KEY) || (loadTabs()[0] && loadTabs()[0].id);
            if (active) selectTab(active);
            setInterval(updateWidgets, 60000);
        }

        // Load Pinned Sites
        function loadPinnedSites() {
            let pins = JSON.parse(localStorage.getItem(PINNED_KEY)) || defaultPins;
            const grid = document.getElementById('pinned-grid');
            grid.innerHTML = '';

            pins.forEach((pin, index) => {
                const card = document.createElement('a');
                card.className = 'pinned-card';
                card.href = pin.url;
                card.target = '_blank';
                card.innerHTML = `
                    <div class="pinned-icon"><i class="fa-brands ${pin.icon}"></i></div>
                    <div class="pinned-name">${pin.name}</div>
                    <button class="pinned-card-remove" onclick="removePinnedSite(event, ${index})" title="Remove">×</button>
                `;
                grid.appendChild(card);
            });

            const addCard = document.createElement('div');
            addCard.className = 'pinned-card';
            addCard.style.cursor = 'pointer';
            addCard.innerHTML = '<div style="font-size: 32px; color: #4097ee;">+</div><div class="pinned-name">Add More</div>';
            addCard.onclick = () => document.getElementById('pin-modal').classList.add('show');
            grid.appendChild(addCard);
        }

        function removePinnedSite(e, index) {
            e.preventDefault();
            e.stopPropagation();
            let pins = JSON.parse(localStorage.getItem(PINNED_KEY)) || defaultPins;
            pins.splice(index, 1);
            localStorage.setItem(PINNED_KEY, JSON.stringify(pins));
            loadPinnedSites();
        }

        // Load Browse History
        function clearBrowseHistory() {
            localStorage.removeItem(HISTORY_KEY);
            loadBrowseHistory();
        }

        function loadBrowseHistory() {
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
            const grid = document.getElementById('browse-grid');
            
            if (history.length === 0) {
                grid.innerHTML = '<div class="no-items-message">No recent items. Start browsing to see history here.</div>';
                return;
            }

            grid.innerHTML = '';
            history.slice(0, 6).forEach(item => {
                try {
                    const link = document.createElement('a');
                    link.className = 'browse-item';
                    link.href = item.url;
                    link.target = '_blank';
                    const hostname = new URL(item.url).hostname || 'Link';
                    link.innerHTML = `
                        <div class="browse-icon"><i class="${item.icon}"></i></div>
                        <div class="browse-text">
                            <div class="browse-title">${item.title}</div>
                            <div class="browse-url">${hostname}</div>
                        </div>
                    `;
                    grid.appendChild(link);
                } catch (e) {
                    console.error('Error rendering history item:', e);
                }
            });
        }

        function addToHistory(title, url) {
            let history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
            const item = {
                title: title || 'Untitled',
                url: url,
                icon: 'fas fa-globe',
                timestamp: Date.now()
            };
            history.unshift(item);
            history = history.slice(0, 20);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        }

        // Update Widgets
        function updateWidgets() {
            updateTime();
            updateWeather();
            updateCurrency();
        }

        function updateTime() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            const date = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            document.getElementById('time-widget').textContent = time;
            document.getElementById('date-widget').textContent = date;
        }

        function updateWeather() {
            navigator.geolocation.getCurrentPosition(pos => {
                const { latitude, longitude } = pos.coords;
                fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code&temperature_unit=celsius`)
                    .then(r => r.json())
                    .then(data => {
                        const temp = Math.round(data.current.temperature_2m);
                        const condition = getWeatherCondition(data.current.weather_code);
                        document.getElementById('weather-widget').textContent = `${temp}°C`;
                        document.getElementById('weather-detail').textContent = condition;
                    })
                    .catch(() => {
                        document.getElementById('weather-widget').textContent = 'N/A';
                        document.getElementById('weather-detail').textContent = 'Weather unavailable';
                    });
            }, () => {
                document.getElementById('weather-widget').textContent = 'N/A';
                document.getElementById('weather-detail').textContent = 'Location access denied';
            });
        }

        function getWeatherCondition(code) {
            const conditions = {
                0: 'Clear',
                1: 'Mostly Clear',
                2: 'Partly Cloudy',
                3: 'Overcast',
                45: 'Foggy',
                51: 'Light Drizzle',
                61: 'Rainy',
                71: 'Snowy',
                80: 'Heavy Rain',
                95: 'Thunderstorm'
            };
            return conditions[code] || 'Unknown';
        }

        function updateCurrency() {
            fetch('https://api.exchangerate-api.com/v4/latest/USD')
                .then(r => r.json())
                .then(data => {
                    const rate = data.rates.EUR.toFixed(2);
                    document.getElementById('currency-widget').textContent = rate;
                    document.getElementById('currency-detail').textContent = '1 USD = EUR';
                })
                .catch(() => {
                    document.getElementById('currency-widget').textContent = 'N/A';
                    document.getElementById('currency-detail').textContent = 'Rate unavailable';
                });
        }

        // Search Functionality
        const searchForm = document.getElementById('search-form');
        const searchInput = document.getElementById('search-input');
        const suggestionsList = document.getElementById('suggestions-list');
        let activeRequestId = 0;
        let pendingScript = null;

        function getLocalSuggestions(query) {
            const q = query.trim().toLowerCase();
            return q ? fallbackSuggestions.filter(item => item.toLowerCase().includes(q)) : fallbackSuggestions.slice(0, 8);
        }

        function showSuggestions() {
            const query = searchInput.value.trim();
            if (!query) {
                suggestionsList.style.display = 'none';
                return;
            }

            const localMatches = getLocalSuggestions(query);
            renderSuggestions(localMatches);

            const requestId = ++activeRequestId;
            const callbackName = `bamiSuggest${Date.now()}${Math.floor(Math.random() * 100000)}`;

            window[callbackName] = (data) => {
                delete window[callbackName];
                if (requestId !== activeRequestId) return;

                const remoteItems = Array.isArray(data?.[1])
                    ? data[1].filter(Boolean).map(item => String(item).trim())
                    : [];

                const combined = [...new Set([...remoteItems, ...localMatches])].slice(0, 10);
                renderSuggestions(combined);
            };

            const script = document.createElement('script');
            script.src = `https://suggestqueries.google.com/complete/search?client=firefox&hl=en&q=${encodeURIComponent(query)}&callback=${callbackName}`;
            script.async = true;
            script.onerror = () => {
                if (requestId === activeRequestId) renderSuggestions(localMatches);
            };

            if (pendingScript) pendingScript.remove();
            document.body.appendChild(script);
            pendingScript = script;

            setTimeout(() => { if (script.parentNode) script.parentNode.removeChild(script); }, 4000);
        }

        function renderSuggestions(items) {
            const uniqueItems = [...new Set(items)].slice(0, 10);
            if (!uniqueItems.length) {
                suggestionsList.style.display = 'none';
                return;
            }

            suggestionsList.innerHTML = '';
            uniqueItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.textContent = item;
                div.onclick = () => {
                    searchInput.value = item;
                    searchForm.submit();
                };
                suggestionsList.appendChild(div);
            });
            suggestionsList.style.display = 'block';
        }

        // Event Listeners
        function setupEventListeners() {
            searchInput.addEventListener('input', (e) => { showSuggestions(); updateActiveTabQuery(e.target.value); });
            searchInput.addEventListener('focus', showSuggestions);

            searchForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const value = searchInput.value.trim();
                if (!value) return;
                updateActiveTabQuery(value);
                const activeId = localStorage.getItem(ACTIVE_TAB_KEY);
                openSearchWindow(activeId || 'search', value);
                addToHistory('Search: ' + value, `https://www.google.com/search?q=${encodeURIComponent(value)}`);
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-wrapper')) {
                    suggestionsList.style.display = 'none';
                }
            });

            document.getElementById('add-pin-btn').addEventListener('click', () => {
                document.getElementById('pin-modal').classList.add('show');
            });

            document.getElementById('clear-history-btn').addEventListener('click', clearBrowseHistory);

            document.getElementById('pin-cancel-btn').addEventListener('click', () => {
                document.getElementById('pin-modal').classList.remove('show');
            });

            document.getElementById('pin-modal').addEventListener('click', (e) => {
                if (e.target.id === 'pin-modal') document.getElementById('pin-modal').classList.remove('show');
            });

            document.getElementById('pin-save-btn').addEventListener('click', addNewPin);

            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const category = btn.dataset.category;
                    searchInput.value = category !== 'all' ? `${searchInput.value} ${category}` : searchInput.value;
                    searchInput.focus();
                });
            });

            document.getElementById('refresh-btn').addEventListener('click', () => {
                location.reload();
            });
        }

        function addNewPin() {
            const name = document.getElementById('pin-name').value.trim();
            const url = document.getElementById('pin-url').value.trim();
            const icon = document.getElementById('pin-icon').value.trim() || 'fa-globe';

            if (!name || !url) {
                alert('Please fill in name and URL');
                return;
            }

            if (!url.startsWith('http')) {
                alert('URL must start with http:// or https://');
                return;
            }

            let pins = JSON.parse(localStorage.getItem(PINNED_KEY)) || defaultPins;
            pins.push({ name, url, icon });
            localStorage.setItem(PINNED_KEY, JSON.stringify(pins));

            document.getElementById('pin-name').value = '';
            document.getElementById('pin-url').value = '';
            document.getElementById('pin-icon').value = '';
            document.getElementById('pin-modal').classList.remove('show');

            loadPinnedSites();
        }

        function updateThemeButton() {
            const btn = document.getElementById('theme-toggle-btn');
            if (!btn) return;
            const theme = localStorage.getItem('theme') === 'dark' ? 'dark' : 'light';
            btn.textContent = theme === 'dark' ? 'Light Mode' : 'Dark Mode';
        }

        function toggleTheme() {
            const nextTheme = localStorage.getItem('theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', nextTheme);
            try{ sessionStorage.removeItem('bami-theme'); }catch(e){}
            updateThemeButton();
            window.location.replace(nextTheme === 'dark' ? 'Darkmode.html' : 'index.html');
        }

        document.getElementById('theme-toggle-btn')?.addEventListener('click', toggleTheme);

        if (localStorage.getItem('theme') === 'light') {
            window.location.replace('index.html');
        }

        updateThemeButton();
        init();
    </script>
</body>
