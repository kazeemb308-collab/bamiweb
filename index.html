</DOCTYPE HTML>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <title>Bamiweb</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        h1 {
            text-align: center;
            margin-top: 50px;
            font-size: 70px;
            font-family: 'Roboto', sans-serif;
            padding: 30px;
        }
        div { font-family: 'Roboto', sans-serif; font-size: 10px; text-align: center; margin-top: 20px; }
        input[type="text"] {
            width: 300px;
            height: 30px;
            font-size: 16px;
        }
        input[type="submit"] {
            height: 36px;
            font-size: 16px;
            padding: 10px 25px;
        }
    </style>
</head>
<body>
    <h1>
        <span style="color: rgba(78, 156, 78, 0.726);">B</span><span style="color: rgb(180, 96, 96);">A</span><span style="color: rgb(190, 190, 107);">M</span><span style="color: rgb(100, 100, 201);">I</span><span style="color: rgb(129, 199, 129);">w</span><span style="color: rgb(187, 125, 125);">e</span><span style="color: rgb(132, 132, 211);">b</span>
    </h1>
    <form action="https://www.google.com/search" method="get" style="text-align: center; margin-top: 20px;">
        <input type="text" name="q" placeholder="Search Bami web" style="width: 90%; height: 30px; font-size: 16px; max-width: 500px; padding: 12px; border-radius: 20px; border: 1px solid #dfe1e5;">
        <input type="submit" value="Search" style="height: 36px; font-size: 16px; padding: 10px 25px;border-radius: 20px; background-color: #f8f9fa; border: none; cursor: pointer;">
    </form>
    <div>
        <p>Bamiweb offered in English, Hindi, and Urdu. You can search in any of these languages.</p>
    </div>
    <br>
    <br>
    <br>
    <br>
    <p style="text-align: center;font-family: 'Roboto', sans-serif;">Bamiweb is a multilingual platform offering content in English, Hindi, and Urdu.</p>
    <p style="text-align: center;color:rgb(100, 100, 201);">© 2026 Bamiweb. All rights reserved.</p>
</body>
</html>
